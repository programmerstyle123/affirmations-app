<!DOCTYPE html>
<html>
<head>
  <title>Affirmations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f6f8;
      padding: 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-bottom: 20px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    input, select {
      padding: 8px;
      margin: 5px;
    }

  </style>
</head>

<body>

<h2>My Affirmations</h2>

<div class="card" id="card">
  Click Next to start
</div>

<div class="buttons">
  <button onclick="prevAffirmation()">⬅ Prev</button>
  <button onclick="nextAffirmation()">Next ➡</button>
</div>

<hr>

<h3>Add New</h3>

<select id="category">
  <option value="work">Work</option>
  <option value="hustle">Hustle</option>
  <option value="health">Health</option>
</select>

<input type="text" id="affirmationInput" placeholder="Add affirmation"/>
<button onclick="addAffirmation()">Add</button>

<script src="app.js"></script>

</body>
</html>
