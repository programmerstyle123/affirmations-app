<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Affirmations</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0e0e12;
      --bg-alt: #15151b;
      --surface: #16161c;
      --surface-2: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.07);
      --text: #f0ede8;
      --muted: #7a7880;
      --tab-bg: rgba(14,14,18,0.85);
      --btn-bg: rgba(255,255,255,0.05);
      --btn-bg-hover: rgba(255,255,255,0.09);
      --pill-all-bg: var(--surface);
      --pill-all-border: var(--border);
      --input-bg: rgba(255,255,255,0.04);
      --noise-opacity: 0.04;
      --theme-toggle-bg: rgba(255,255,255,0.06);
      --theme-toggle-border: rgba(255,255,255,0.08);
      --theme-toggle-text: #f0ede8;
      --theme-toggle-shadow: 0 10px 30px rgba(0,0,0,0.18);

      --accent-work: #c9a96e;
      --accent-hustle: #7eb8a4;
      --accent-health: #c97fa0;

      --accent-work-bg: rgba(201,169,110,0.08);
      --accent-hustle-bg: rgba(126,184,164,0.08);
      --accent-health-bg: rgba(201,127,160,0.08);
    }

    body[data-theme="light"] {
      --bg: #fbf7f0;
      --bg-alt: #f3ecdf;
      --surface: rgba(255, 252, 246, 0.86);
      --surface-2: rgba(255,255,255,0.55);
      --border: rgba(109, 89, 63, 0.12);
      --text: #2f2a24;
      --muted: #7c6f63;
      --tab-bg: rgba(255, 252, 246, 0.78);
      --btn-bg: rgba(92, 72, 44, 0.06);
      --btn-bg-hover: rgba(92, 72, 44, 0.10);
      --pill-all-bg: rgba(255,255,255,0.74);
      --pill-all-border: rgba(109, 89, 63, 0.12);
      --input-bg: rgba(255,255,255,0.82);
      --noise-opacity: 0.02;
      --theme-toggle-bg: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(248, 241, 231, 0.92));
      --theme-toggle-border: rgba(109, 89, 63, 0.10);
      --theme-toggle-text: #3a332d;
      --theme-toggle-shadow: 0 16px 40px rgba(157, 120, 80, 0.14);

      --accent-work: #b8862f;
      --accent-hustle: #69a88d;
      --accent-health: #c97591;

      --accent-work-bg: rgba(184,134,47,0.10);
      --accent-hustle-bg: rgba(105,168,141,0.12);
      --accent-health-bg: rgba(201,117,145,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background:
        radial-gradient(circle at top left, rgba(201,169,110,0.10), transparent 26%),
        radial-gradient(circle at top right, rgba(126,184,164,0.10), transparent 22%),
        radial-gradient(circle at bottom, rgba(201,127,160,0.08), transparent 26%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-alt) 100%);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.45s ease, color 0.45s ease;
    }

    /* ── noise overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: var(--noise-opacity);
      pointer-events: none; z-index: 0;
      transition: opacity 0.45s ease;
    }

    body[data-theme="light"]::before {
      background-image:
        radial-gradient(circle at 20% 10%, rgba(255, 230, 173, 0.42), transparent 26%),
        radial-gradient(circle at 85% 15%, rgba(194, 232, 217, 0.34), transparent 22%),
        radial-gradient(circle at 70% 88%, rgba(242, 203, 217, 0.26), transparent 24%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: cover, cover, cover, auto;
      background-blend-mode: screen, screen, screen, normal;
    }

    /* ── TAB BAR ── */
    .tab-bar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px;
      padding: 16px 32px;
      background: var(--tab-bg);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      transition: background 0.45s ease, border-color 0.45s ease;
    }

    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-weight: 300; letter-spacing: 0.08em;
      color: var(--text); opacity: 0.9;
      white-space: nowrap;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--theme-toggle-border);
      background: var(--theme-toggle-bg);
      color: var(--theme-toggle-text);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      box-shadow: var(--theme-toggle-shadow);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      letter-spacing: 0.02em;
      transition: transform 0.2s ease, background 0.45s ease, border-color 0.45s ease, color 0.45s ease;
      white-space: nowrap;
    }

    .theme-toggle:hover { transform: translateY(-1px); }
    .theme-icon {
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      font-size: 14px;
      line-height: 1;
    }

    .tabs {
      display: flex; gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      transition: background 0.45s ease, border-color 0.45s ease;
    }

    .tab-btn {
      padding: 7px 20px;
      border: none; border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 400;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .tab-btn.active {
      background: rgba(255,255,255,0.06);
      color: var(--text);
    }

    body[data-theme="light"] .tab-btn.active {
      background: rgba(184,134,47,0.10);
    }

    /* ── PAGES ── */
    .page { display: none; animation: fadeUp 0.5s ease forwards; position: relative; z-index: 1; }
    .page.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══ PAGE 1: AFFIRMATION VIEWER ══ */
    .viewer {
      min-height: calc(100vh - 57px);
      display: flex; flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px;
      position: relative; z-index: 1;
    }

    .category-pills {
      display: flex; gap: 8px; margin-bottom: 50px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .pill {
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 12px; font-weight: 500; letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer; border: 1px solid transparent;
      transition: all 0.2s;
      user-select: none;
    }

    .pill[data-cat="all"]    { color: var(--text); border-color: var(--pill-all-border); background: var(--pill-all-bg); }
    .pill[data-cat="work"]   { color: var(--accent-work);   border-color: rgba(201,169,110,0.3); background: var(--accent-work-bg); }
    .pill[data-cat="hustle"] { color: var(--accent-hustle); border-color: rgba(126,184,164,0.3); background: var(--accent-hustle-bg); }
    .pill[data-cat="health"] { color: var(--accent-health); border-color: rgba(201,127,160,0.3); background: var(--accent-health-bg); }

    .pill.active, .pill:hover { opacity: 1; filter: brightness(1.08); }
    .pill:not(.active) { opacity: 0.7; }

    /* main card */
    .card-wrap {
      position: relative; width: 100%; max-width: 640px;
      margin-bottom: 44px;
    }

    /* glow behind card */
    .card-wrap::before {
      content: '';
      position: absolute; inset: -30px;
      border-radius: 40px;
      background: var(--card-glow, radial-gradient(ellipse at 50% 60%, rgba(201,169,110,0.12) 0%, transparent 70%));
      transition: background 0.6s ease;
      pointer-events: none;
      filter: blur(0px);
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 64px 52px;
      text-align: center;
      min-height: 240px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px;
      overflow: hidden;
      transition: border-color 0.4s, background 0.45s ease, box-shadow 0.45s ease;
      box-shadow: 0 18px 40px rgba(0,0,0,0.12);
    }

    body[data-theme="light"] .card {
      box-shadow: 0 20px 50px rgba(139, 102, 58, 0.10);
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,252,246,0.86));
    }

    .card::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: var(--card-line, linear-gradient(90deg, transparent, rgba(201,169,110,0.5), transparent));
      transition: background 0.5s;
    }

    .card-category-badge {
      font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--card-accent, var(--accent-work));
      opacity: 0.85;
    }

    .card-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 300; font-style: italic;
      line-height: 1.45;
      color: var(--text);
      transition: opacity 0.3s, color 0.45s ease;
    }

    .card-index {
      font-size: 12px; color: var(--muted); letter-spacing: 0.04em;
      transition: color 0.45s ease;
    }

    /* nav */
    .nav-row {
      display: flex; align-items: center; gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nav-btn {
      width: 52px; height: 52px;
      border-radius: 50%; border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s, background 0.45s ease, border-color 0.45s ease, color 0.45s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .nav-btn:hover {
      background: var(--btn-bg-hover);
      border-color: rgba(255,255,255,0.15);
      transform: scale(1.05);
    }

    body[data-theme="light"] .nav-btn:hover {
      border-color: rgba(184,134,47,0.22);
    }

    .shuffle-btn {
      padding: 12px 28px;
      border-radius: 100px; border: none;
      background: var(--btn-bg);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.2s, color 0.45s ease, background 0.45s ease;
    }

    .shuffle-btn:hover { background: var(--btn-bg-hover); color: var(--text); }

    /* progress dots */
    .progress-dots {
      display: flex; gap: 6px; margin-top: 36px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 92vw;
    }

    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--border);
      transition: all 0.3s;
      cursor: pointer;
    }

    .dot.active {
      background: var(--card-accent, var(--accent-work));
      width: 18px; border-radius: 3px;
    }

    /* ══ PAGE 2: ADD AFFIRMATIONS ══ */
    .adder {
      min-height: calc(100vh - 57px);
      padding: 60px 20px 80px;
      max-width: 720px;
      margin: 0 auto;
      position: relative; z-index: 1;
    }

    .adder-header { margin-bottom: 48px; }

    .adder-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 300; line-height: 1.2;
      margin-bottom: 10px;
    }

    .adder-header p {
      color: var(--muted); font-size: 14px; line-height: 1.6;
      transition: color 0.45s ease;
    }

    /* category sections */
    .category-section {
      margin-bottom: 36px;
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      background: var(--surface);
      transition: background 0.45s ease, border-color 0.45s ease, box-shadow 0.45s ease;
      box-shadow: 0 10px 28px rgba(0,0,0,0.08);
    }

    body[data-theme="light"] .category-section {
      background: rgba(255,255,255,0.84);
      box-shadow: 0 14px 35px rgba(145, 111, 71, 0.08);
    }

    .cat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .cat-header-left {
      display: flex; align-items: center; gap: 12px;
    }

    .cat-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }

    [data-section="work"]   .cat-dot { background: var(--accent-work); }
    [data-section="hustle"] .cat-dot { background: var(--accent-hustle); }
    [data-section="health"] .cat-dot { background: var(--accent-health); }

    .cat-name {
      font-weight: 500; font-size: 14px; letter-spacing: 0.03em;
    }

    .cat-count {
      font-size: 12px; color: var(--muted);
      background: rgba(255,255,255,0.05);
      padding: 3px 10px; border-radius: 100px;
      transition: color 0.45s ease, background 0.45s ease;
    }

    body[data-theme="light"] .cat-count {
      background: rgba(184,134,47,0.08);
    }

    .cat-chevron {
      color: var(--muted); font-size: 12px;
      transition: transform 0.3s, color 0.45s ease;
    }

    .category-section.open .cat-chevron { transform: rotate(180deg); }

    .cat-body {
      display: none;
      padding: 8px 0;
    }

    .category-section.open .cat-body { display: block; }

    .affirmation-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .affirmation-item:last-child { border-bottom: none; }
    .affirmation-item:hover { background: rgba(255,255,255,0.025); }

    body[data-theme="light"] .affirmation-item:hover {
      background: rgba(184,134,47,0.04);
    }

    .affirmation-item span {
      font-size: 14px;
      color: var(--text);
      opacity: 0.88;
      line-height: 1.5; flex: 1;
      transition: color 0.45s ease, opacity 0.45s ease;
    }

    .del-btn {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 16px; padding: 4px 8px;
      border-radius: 6px; transition: all 0.15s;
      flex-shrink: 0; margin-left: 12px;
    }

    .del-btn:hover { color: #e07070; background: rgba(224,112,112,0.1); }

    /* add form inside section */
    .add-form {
      padding: 16px 24px;
      display: flex; gap: 10px;
      border-top: 1px solid var(--border);
    }

    .add-form input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, background 0.45s ease, color 0.45s ease;
    }

    .add-form input::placeholder { color: var(--muted); }
    .add-form input:focus { border-color: rgba(184,134,47,0.28); }

    .add-btn {
      padding: 10px 20px;
      border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
      white-space: nowrap;
    }

    [data-section="work"]   .add-btn { background: rgba(201,169,110,0.15); color: var(--accent-work); }
    [data-section="hustle"] .add-btn { background: rgba(126,184,164,0.15); color: var(--accent-hustle); }
    [data-section="health"] .add-btn { background: rgba(201,127,160,0.15); color: var(--accent-health); }

    .add-btn:hover { filter: brightness(1.08); }

    /* empty state */
    .empty-cat {
      padding: 20px 24px;
      color: var(--muted); font-size: 13px; font-style: italic;
      text-align: center;
      transition: color 0.45s ease;
    }

    /* card animation */
    @keyframes cardFlip {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      40%  { opacity: 0; transform: translateY(-12px) scale(0.97); }
      60%  { opacity: 0; transform: translateY(12px) scale(0.97); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card.animating { animation: cardFlip 0.4s ease; }

    @media (max-width: 720px) {
      .tab-bar {
        padding: 14px 16px;
        flex-wrap: wrap;
      }

      .top-actions {
        width: 100%;
        justify-content: space-between;
        margin-left: 0;
      }

      .tabs {
        flex: 1;
        justify-content: center;
      }
    }

    @media (max-width: 600px) {
      .viewer, .adder { padding-left: 16px; padding-right: 16px; }
      .card { padding: 44px 24px; }
      .cat-header { padding: 16px 18px; }
      .affirmation-item { padding: 12px 18px; }
      .add-form { padding: 14px 18px; }
    }
  </style>
</head>
<body>

<!-- TAB BAR -->
<div class="tab-bar">
  <div class="brand">✦ Affirmations</div>

  <div class="top-actions">
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" type="button" aria-label="Toggle light and dark theme">
      <span class="theme-icon" id="themeIcon">☾</span>
      <span id="themeLabel">Dark</span>
    </button>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('viewer', event)">Today's Practice</button>
      <button class="tab-btn" onclick="switchTab('adder', event)">Manage</button>
    </div>
  </div>
</div>

<!-- PAGE 1: VIEWER -->
<div class="page active" id="page-viewer">
  <div class="viewer">

    <div class="category-pills">
      <div class="pill active" data-cat="all" onclick="filterCat('all')">All</div>
      <div class="pill" data-cat="work" onclick="filterCat('work')">Work</div>
      <div class="pill" data-cat="hustle" onclick="filterCat('hustle')">Hustle</div>
      <div class="pill" data-cat="health" onclick="filterCat('health')">Health</div>
    </div>

    <div class="card-wrap" id="cardWrap">
      <div class="card" id="card">
        <div class="card-category-badge" id="cardBadge">Work</div>
        <div class="card-text" id="cardText">Loading…</div>
        <div class="card-index" id="cardIdx">1 of 12</div>
      </div>
    </div>

    <div class="nav-row">
      <button class="nav-btn" onclick="prevAffirmation()" title="Previous">←</button>
      <button class="shuffle-btn" onclick="shuffle()">⇄ Shuffle</button>
      <button class="nav-btn" onclick="nextAffirmation()" title="Next">→</button>
    </div>

    <div class="progress-dots" id="progressDots"></div>

  </div>
</div>

<!-- PAGE 2: ADDER -->
<div class="page" id="page-adder">
  <div class="adder">
    <div class="adder-header">
      <h1>Your Affirmations</h1>
      <p>Add, remove, and organise your intentions across every area of life.</p>
    </div>

    <div id="sections"></div>
  </div>
</div>

<script>
const CAT_META = {
  work:   { label: 'Work',   accent: '#c9a96e', glow: 'rgba(201,169,110,0.12)', line: 'rgba(201,169,110,0.5)' },
  hustle: { label: 'Hustle', accent: '#7eb8a4', glow: 'rgba(126,184,164,0.12)', line: 'rgba(126,184,164,0.5)' },
  health: { label: 'Health', accent: '#c97fa0', glow: 'rgba(201,127,160,0.12)', line: 'rgba(201,127,160,0.5)' },
};

const DEFAULT = {
  work: [
    "My work is going smoothly.",
    "I finish my tasks early.",
    "I stay calm and focused at work."
  ],
  hustle: [
    "My side work is growing every day.",
    "I am earning money from my efforts.",
    "I am making good money from dropshipping.",
    "My Instagram page is growing fast and getting real followers.",
    "More people are discovering my content every day.",
    "Good opportunities are coming to me."
  ],
  health: [
    "I feel healthy and full of energy.",
    "My mind is calm and positive.",
    "I take care of my body every day."
  ]
};

const STORAGE_KEY = 'affirmations_v2';
const THEME_KEY = 'affirmations_theme';

let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || JSON.parse(JSON.stringify(DEFAULT));
let filterCurrent = 'all';
let currentIndex = 0;

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function getList() {
  if (filterCurrent === 'all') {
    return [
      ...data.work.map(t => ({ text: t, cat: 'work' })),
      ...data.hustle.map(t => ({ text: t, cat: 'hustle' })),
      ...data.health.map(t => ({ text: t, cat: 'health' })),
    ];
  }
  return data[filterCurrent].map(t => ({ text: t, cat: filterCurrent }));
}

function updateCard(animate) {
  const list = getList();
  if (!list.length) {
    document.getElementById('cardText').textContent = 'No affirmations here yet.';
    document.getElementById('cardBadge').textContent = '';
    document.getElementById('cardIdx').textContent = '';
    renderDots(0, 0);
    return;
  }
  if (currentIndex >= list.length) currentIndex = 0;
  const item = list[currentIndex];
  const meta = CAT_META[item.cat];

  const card = document.getElementById('card');
  const wrap = document.getElementById('cardWrap');

  function applyContent() {
    document.getElementById('cardBadge').textContent = meta.label.toUpperCase();
    document.getElementById('cardText').textContent = item.text;
    document.getElementById('cardIdx').textContent = `${currentIndex + 1} of ${list.length}`;
    document.getElementById('cardBadge').style.color = meta.accent;
    card.style.borderColor = `${meta.accent}22`;
    card.style.setProperty('--card-accent', meta.accent);
    wrap.style.setProperty('--card-glow', `radial-gradient(ellipse at 50% 60%, ${meta.glow} 0%, transparent 70%)`);
    card.style.setProperty('--card-line', `linear-gradient(90deg, transparent, ${meta.line}, transparent)`);
    renderDots(currentIndex, list.length);
  }

  if (animate) {
    card.classList.add('animating');
    setTimeout(() => { applyContent(); card.classList.remove('animating'); }, 200);
  } else {
    applyContent();
  }
}

function renderDots(cur, total) {
  const container = document.getElementById('progressDots');
  const max = Math.min(total, 12);
  container.innerHTML = '';
  for (let i = 0; i < max; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === cur % max ? ' active' : '');
    d.onclick = () => { currentIndex = i; updateCard(true); };
    container.appendChild(d);
  }
}

function nextAffirmation() {
  const list = getList();
  if (!list.length) return;
  currentIndex = (currentIndex + 1) % list.length;
  updateCard(true);
}

function prevAffirmation() {
  const list = getList();
  if (!list.length) return;
  currentIndex = (currentIndex - 1 + list.length) % list.length;
  updateCard(true);
}

function shuffle() {
  const list = getList();
  if (!list.length) return;
  currentIndex = Math.floor(Math.random() * list.length);
  updateCard(true);
}

function filterCat(cat) {
  filterCurrent = cat;
  currentIndex = 0;
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.cat === cat));
  updateCard(true);
}

// ── TAB SWITCHING ──
function switchTab(name, e) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (e && e.target) e.target.classList.add('active');
  if (name === 'adder') renderSections();
}

// ── THEME TOGGLE ──
function setTheme(theme) {
  document.body.dataset.theme = theme;
  localStorage.setItem(THEME_KEY, theme);

  const isLight = theme === 'light';
  document.getElementById('themeIcon').textContent = isLight ? '☀' : '☾';
  document.getElementById('themeLabel').textContent = isLight ? 'Light' : 'Dark';
}

function toggleTheme() {
  const current = document.body.dataset.theme === 'light' ? 'light' : 'dark';
  setTheme(current === 'light' ? 'dark' : 'light');
}

function initTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  setTheme(saved === 'light' ? 'light' : 'dark');
}

// ── MANAGE PAGE ──
function renderSections() {
  const container = document.getElementById('sections');
  container.innerHTML = '';

  Object.keys(CAT_META).forEach(cat => {
    const meta = CAT_META[cat];
    const items = data[cat];

    const sec = document.createElement('div');
    sec.className = 'category-section open';
    sec.dataset.section = cat;

    sec.innerHTML = `
      <div class="cat-header" onclick="toggleSection(this)">
        <div class="cat-header-left">
          <div class="cat-dot"></div>
          <span class="cat-name">${meta.label}</span>
          <span class="cat-count" id="count-${cat}">${items.length}</span>
        </div>
        <span class="cat-chevron">▾</span>
      </div>
      <div class="cat-body" id="body-${cat}">
        ${items.length === 0 ? '<div class="empty-cat">No affirmations yet — add one below.</div>' : items.map((txt, i) => `
          <div class="affirmation-item" id="item-${cat}-${i}">
            <span>${escHtml(txt)}</span>
            <button class="del-btn" onclick="deleteAff('${cat}', ${i})" title="Delete">✕</button>
          </div>
        `).join('')}
        <div class="add-form">
          <input type="text" id="input-${cat}" placeholder="Write a new ${meta.label.toLowerCase()} affirmation…" onkeydown="if(event.key==='Enter') addAff('${cat}')"/>
          <button class="add-btn" onclick="addAff('${cat}')">Add</button>
        </div>
      </div>
    `;
    container.appendChild(sec);
  });
}

function toggleSection(header) {
  header.closest('.category-section').classList.toggle('open');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addAff(cat) {
  const input = document.getElementById('input-' + cat);
  const val = input.value.trim();
  if (!val) return;
  data[cat].push(val);
  save();
  input.value = '';
  renderSections();
  updateCard(false);
}

function deleteAff(cat, idx) {
  data[cat].splice(idx, 1);
  save();
  renderSections();
  updateCard(false);
}

// INIT
initTheme();
updateCard(false);

// keyboard nav
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight') nextAffirmation();
  if (e.key === 'ArrowLeft')  prevAffirmation();
});
</script>
</body>
</html>
